<!DOCTYPE html>
<html>
<head>
    <title>AI Interview Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>AI Interview Simulator</h1>

<!-- Skill input -->
<input type="text" id="skillInput" placeholder="Enter skill (Java, Python)">
<button type="button" onclick="generateQuestions()">Generate Questions</button>

<br><br>

<!-- Resume upload -->
<h3>Upload Resume</h3>
<input type="file" id="resumeInput">
<button type="button" onclick="uploadResume()">Generate Questions from Resume</button>

<!-- Output -->
<div id="output"></div>
<div id="finalOutput"></div>

<script src="script.js"></script>

</body>
</html>
